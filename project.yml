name: SmartiecoinWallet
options:
  bundleIdPrefix: com.smartiecoin
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  secp256k1:
    url: https://github.com/GigaBitcoin/secp256k1.swift
    exactVersion: "0.10.0"

targetTemplates:
  SmartiecoinBase:
    type: application
    platform: iOS
    sources:
      - path: SmartiecoinWallet
        excludes:
          - Resources/Assets.xcassets
    resources:
      - path: SmartiecoinWallet/Resources/Assets.xcassets
    settings:
      base:
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: SmartiecoinWallet/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: true
    dependencies:
      - package: secp256k1

targets:
  SmartiecoinNode:
    templates:
      - SmartiecoinBase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartiecoin.node
        PRODUCT_NAME: "Smartiecoin Node"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "WALLET_MODE_SPV"
        INFOPLIST_KEY_CFBundleDisplayName: "SMT Node"

  SmartiecoinLite:
    templates:
      - SmartiecoinBase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartiecoin.lite
        PRODUCT_NAME: "Smartiecoin Lite"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "WALLET_MODE_API"
        INFOPLIST_KEY_CFBundleDisplayName: "SMT Lite"
