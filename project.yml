name: SmartiecoinWallet
options:
  bundleIdPrefix: com.smartiecoin
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  secp256k1:
    url: https://github.com/GigaBitcoin/secp256k1.swift
    exactVersion: "0.10.0"

targets:
  SmartiecoinWallet:
    type: application
    platform: iOS
    sources:
      - path: SmartiecoinWallet
        excludes:
          - Resources/Assets.xcassets
    resources:
      - path: SmartiecoinWallet/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartiecoin.wallet
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: SmartiecoinWallet/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: true
    dependencies:
      - package: secp256k1
