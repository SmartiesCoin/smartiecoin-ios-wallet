name: Build iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build SmartiecoinWallet (Swift Native)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinWallet \
            -skipPackagePluginValidation

      - name: Build for iPhone Simulator
        run: |
          xcodebuild build \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinWallet \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Release \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Build for iPad Simulator
        run: |
          xcodebuild build \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinWallet \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4),OS=latest' \
            -configuration Release \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Build unsigned .app (Release)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          xcodebuild \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinWallet \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r SmartiecoinWallet.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: SmartiecoinWallet-IPA
          path: SmartiecoinWallet.ipa
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SmartiecoinWallet.ipa
          body: |
            ## Smartiecoin Wallet v2.0.0 (Native SwiftUI)

            ### Installation (Sideload)
            1. Download `SmartiecoinWallet.ipa`
            2. Install using **AltStore** or **Sideloadly**
            3. Trust the app in Settings > General > Device Management

            ### What's New
            - Native SwiftUI rewrite (no React Native)
            - SPV P2P client - zero server dependency
            - Native iPad support with adaptive layouts
            - Keychain-based secure storage
            - P2P network status with manual peer management
            - Create / Import wallet (12-word recovery phrase)
            - Send & Receive SMT with QR codes
            - Transaction history
          generate_release_notes: true
