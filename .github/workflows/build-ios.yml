name: Build iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Smartiecoin Wallets
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinNode \
            -skipPackagePluginValidation

      # On push to main: only build Node (Lite is stable)
      - name: Build Smartiecoin Node (SPV)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          xcodebuild build \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinNode \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      # On tag: build both for device and package IPAs
      - name: Build Smartiecoin Node IPA
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          xcodebuild \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinNode \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build-node \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Smartiecoin Lite IPA
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          xcodebuild \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinLite \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build-lite \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPAs
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          APP_PATH=$(find build-node -name "*.app" -type d | head -1)
          mkdir -p Payload && cp -r "$APP_PATH" Payload/
          zip -r SmartiecoinNode.ipa Payload && rm -rf Payload

          APP_PATH=$(find build-lite -name "*.app" -type d | head -1)
          mkdir -p Payload && cp -r "$APP_PATH" Payload/
          zip -r SmartiecoinLite.ipa Payload && rm -rf Payload

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: SmartiecoinWallet-IPAs
          path: |
            SmartiecoinNode.ipa
            SmartiecoinLite.ipa
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SmartiecoinNode.ipa
            SmartiecoinLite.ipa
          body: |
            ## Smartiecoin Wallet ${{ github.ref_name }}

            **SMT Node** - P2P direct to blockchain, zero server
            **SMT Lite** - Uses wallet.smartiecoin.com API

            ### Install
            1. Download the IPA
            2. Install with AltStore or Sideloadly
            3. Trust in Settings > General > Device Management
          generate_release_notes: true
