name: Build iOS IPA

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project (Expo prebuild)
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build unsigned .app
        run: |
          xcodebuild \
            -workspace ios/SmartiecoinWallet.xcworkspace \
            -scheme SmartiecoinWallet \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r SmartiecoinWallet.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartiecoinWallet-IPA
          path: SmartiecoinWallet.ipa
          retention-days: 90

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SmartiecoinWallet.ipa
          body: |
            ## Smartiecoin Wallet iOS

            ### Installation (Sideload)
            1. Download `SmartiecoinWallet.ipa`
            2. Install using **AltStore** or **Sideloadly**
            3. Trust the app in Settings > General > Device Management

            ### What's included
            - Create / Import wallet (12-word recovery phrase)
            - Send & Receive SMT
            - Transaction history
            - QR code for receiving
          generate_release_notes: true
