name: Build iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Smartiecoin Wallets
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinNode \
            -skipPackagePluginValidation

      - name: Build Smartiecoin Node (SPV) - iPhone
        run: |
          xcodebuild build \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinNode \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Smartiecoin Lite (API) - iPhone
        run: |
          xcodebuild build \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinLite \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      # Release builds (only on tag push)
      - name: Build Smartiecoin Node IPA
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          xcodebuild \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinNode \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build-node \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Smartiecoin Lite IPA
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          xcodebuild \
            -project SmartiecoinWallet.xcodeproj \
            -scheme SmartiecoinLite \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build-lite \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPAs
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Smartiecoin Node IPA
          APP_PATH=$(find build-node -name "*.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r SmartiecoinNode.ipa Payload
          rm -rf Payload

          # Smartiecoin Lite IPA
          APP_PATH=$(find build-lite -name "*.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r SmartiecoinLite.ipa Payload
          rm -rf Payload

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: SmartiecoinWallet-IPAs
          path: |
            SmartiecoinNode.ipa
            SmartiecoinLite.ipa
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SmartiecoinNode.ipa
            SmartiecoinLite.ipa
          body: |
            ## Smartiecoin Wallet v2.0.0

            ### Two versions included:

            **Smartiecoin Node** (SPV) - Connects directly to the blockchain via P2P
            - Zero server dependency
            - Syncs block headers from Smartiecoin nodes
            - BIP37 Bloom filter for transaction privacy
            - Manual peer management (paste addnode= format)

            **Smartiecoin Lite** (API) - Uses wallet.smartiecoin.com API
            - Instant sync, no waiting
            - Lower battery/data usage
            - Depends on API server availability

            ### Both versions include:
            - Native SwiftUI for iPhone and iPad
            - 12-word recovery phrase (BIP39)
            - Send & Receive SMT with QR codes
            - iOS Keychain encrypted storage
            - Transaction history

            ### Installation (Sideload)
            1. Download the IPA you prefer
            2. Install using **AltStore** or **Sideloadly**
            3. Trust the app in Settings > General > Device Management
          generate_release_notes: true
